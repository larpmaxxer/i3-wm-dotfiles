[colors]
background = #000000
foreground = #ffffff
primary = #ffffff
dim = #737373
module-bg = #1f1f1f

[bar/main]
width = 100%
height = 32
offset-y = 8
radius = 16
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 1
border-color = #292929

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = JetBrains Mono:size=9;2
font-1 = Font Awesome 6 Free Solid:size=9;2

modules-left = i3
modules-center = mpd
modules-right = network pulseaudio battery date

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsmumbers = true
format = <label-state>

label-focused = %index%
label-focused-background = ${colors.primary}
label-focused-foreground = ${colors.background}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-background = ${colors.module-bg}
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 2

[module/mpd]
type = internal/mpd
format-online = <icon-prev> <label-song> <icon-next>
label-song = %title%
label-song-foreground = ${colors.primary}
icon-prev =
icon-next =

[module/network]
type = internal/network
interface-type = wireless
label-connected =  Connected
label-connected-background = ${colors.module-bg}
label-connected-foreground = ${colors.foreground}
label-connected-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
label-volume =  %percentage%%
label-volume-background = ${colors.module-bg}
label-volume-foreground = ${colors.foreground}
label-volume-padding = 2

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
label-charging =  %percentage%%
label-charging-background = ${colors.module-bg}
label-charging-foreground = ${colors.foreground}
label-charging-padding = 2
label-discharging =  %percentage%%
label-discharging-background = ${colors.module-bg}
label-discharging-foreground = ${colors.foreground}
label-discharging-padding = 2

[module/date]
type = internal/date
interval = 1
date = %H:%M
label =  %date%
label-background = ${colors.module-bg}
label-foreground = ${colors.foreground}
label-padding = 2
